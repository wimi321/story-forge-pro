<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" rx="40" fill="#EADCCB"/>
  <rect x="30" y="30" width="1380" height="840" rx="32" fill="#FBF4EA"/>
  <rect x="66" y="66" width="294" height="768" rx="28" fill="#F3E8D8" stroke="#DDC7B1"/>
  <rect x="94" y="96" width="238" height="154" rx="24" fill="#171311"/>
  <text x="120" y="138" fill="#F8EFE6" font-family="Georgia, serif" font-size="18">Novel Mode</text>
  <text x="120" y="190" fill="#FFF8F0" font-family="Georgia, serif" font-size="38" font-weight="700">Build a marketable</text>
  <text x="120" y="230" fill="#FFF8F0" font-family="Georgia, serif" font-size="38" font-weight="700">story from zero</text>
  <rect x="94" y="284" width="238" height="212" rx="24" fill="#FFF9F0" stroke="#E5D4C3"/>
  <text x="118" y="324" fill="#7E6A59" font-family="Helvetica, Arial, sans-serif" font-size="13">STARTER PACK</text>
  <text x="118" y="362" fill="#171311" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="700">悬疑 / Suspense</text>
  <text x="118" y="402" fill="#5F5248" font-family="Helvetica, Arial, sans-serif" font-size="16">先做钩子、秘密、误导线索、主角风险，再进入章节规划。</text>
  <rect x="118" y="438" width="188" height="42" rx="16" fill="#171311"/>
  <text x="166" y="464" fill="#FFF8F0" font-family="Helvetica, Arial, sans-serif" font-size="16">开始这个方向</text>
  <rect x="390" y="66" width="986" height="168" rx="28" fill="#FFF9F0" stroke="#E4D2BE"/>
  <text x="426" y="120" fill="#A06038" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="2">PROFESSIONAL NOVEL WORKFLOW</text>
  <text x="426" y="180" fill="#171311" font-family="Georgia, serif" font-size="54" font-weight="700">先把人物、冲突、大纲做对，</text>
  <text x="426" y="228" fill="#171311" font-family="Georgia, serif" font-size="54" font-weight="700">再开始写正文</text>
  <rect x="390" y="260" width="472" height="260" rx="28" fill="#FFF9F0" stroke="#E4D2BE"/>
  <text x="424" y="308" fill="#171311" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">当前输入</text>
  <rect x="424" y="334" width="404" height="150" rx="22" fill="#FFFFFF" stroke="#E1D0BE"/>
  <text x="452" y="374" fill="#5D5146" font-family="Helvetica, Arial, sans-serif" font-size="18">我想写一个适合女生看的现代悬疑爱情故事，</text>
  <text x="452" y="406" fill="#5D5146" font-family="Helvetica, Arial, sans-serif" font-size="18">但我不会搭人物和大纲，请一步一步带我开始。</text>
  <rect x="892" y="260" width="484" height="260" rx="28" fill="#2A1A15"/>
  <text x="928" y="308" fill="#FFF8F0" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">立即输出</text>
  <text x="928" y="360" fill="#F6EEE5" font-family="Helvetica, Arial, sans-serif" font-size="17">1. 题材定位与读者承诺</text>
  <text x="928" y="396" fill="#F6EEE5" font-family="Helvetica, Arial, sans-serif" font-size="17">2. 主角 / 反派 / 关系张力</text>
  <text x="928" y="432" fill="#F6EEE5" font-family="Helvetica, Arial, sans-serif" font-size="17">3. 冲突系统与升级路线</text>
  <text x="928" y="468" fill="#F6EEE5" font-family="Helvetica, Arial, sans-serif" font-size="17">4. 章节大纲与首章起手式</text>
  <rect x="390" y="548" width="986" height="256" rx="28" fill="#FFF9F0" stroke="#E4D2BE"/>
  <text x="426" y="596" fill="#171311" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">为什么它对新手更友好</text>
  <rect x="426" y="626" width="286" height="136" rx="24" fill="#F6EBDD"/>
  <rect x="740" y="626" width="286" height="136" rx="24" fill="#F6EBDD"/>
  <rect x="1054" y="626" width="286" height="136" rx="24" fill="#F6EBDD"/>
  <text x="450" y="666" fill="#171311" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">先规划再写</text>
  <text x="450" y="704" fill="#5E5148" font-family="Helvetica, Arial, sans-serif" font-size="16">默认先做卖点、人物、冲突和大纲，不逼你直接写长文。</text>
  <text x="764" y="666" fill="#171311" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">输出更可执行</text>
  <text x="764" y="704" fill="#5E5148" font-family="Helvetica, Arial, sans-serif" font-size="16">更偏章节卡、冲突表、推进方案，而不是空泛文案。</text>
  <text x="1078" y="666" fill="#171311" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">小步推进</text>
  <text x="1078" y="704" fill="#5E5148" font-family="Helvetica, Arial, sans-serif" font-size="16">把“写一本书”拆成今天就能完成的下一步动作。</text>
</svg>
